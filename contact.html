<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | SK Kausik Hussain</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css?v=8" />

    <style>
      .contact-wrap {
        min-height: calc(100vh - 85px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 15px;
      }

      .contact-card {
        width: 100%;
        max-width: 760px;
        background: var(--card);
        border: 1px solid var(--border);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 28px;
        padding: 45px;
        box-shadow: var(--shadow-strong);
      }

      .contact-card h1 {
        font-size: clamp(2rem, 4vw, 3rem);
        margin-bottom: 12px;
      }

      .contact-card p {
        color: var(--muted);
        line-height: 1.8;
      }

      .form-label {
        font-weight: 600;
        font-size: 0.95rem;
        margin-bottom: 8px;
      }

      .form-control {
        border-radius: 14px;
        padding: 14px 16px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        transition: all 0.3s ease;
      }

      .form-control:focus {
        background: rgba(255, 255, 255, 0.08);
        border-color: var(--accent);
        box-shadow: 0 0 0 0.2rem rgba(0, 229, 255, 0.15);
        color: var(--text);
      }

      /* Fix input placeholder color in dark mode */
      .form-control::placeholder {
        color: var(--muted);
        opacity: 0.7;
      }

      body.dark-mode .form-control {
        color: #ffffff;
      }
      body.dark-mode .form-control:focus {
        color: #ffffff;
      }
    </style>
  </head>
  <body class="dark-mode">
    <!-- Background Effects -->
    <div class="background-blobs">
      <span class="blob blob1"></span>
      <span class="blob blob2"></span>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg custom-navbar">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span>Kausik</span>.dev
        </a>
        <a href="index.html" class="btn outline-btn btn-sm">
          <i class="fa-solid fa-arrow-left me-1"></i> Back to Home
        </a>
      </div>
    </nav>

    <!-- Contact Form Container -->
    <section class="contact-wrap">
      <div class="contact-card reveal active">
        <div class="text-center mb-4">
          <span class="section-tag">Get in Touch</span>
          <h1>Let's Connect</h1>
          <p>
            Have an open position, project proposal, or collaboration idea? 
            Send me a message below.
          </p>
        </div>

        <form
          action="mailto:kausik1027@gmail.com"
          method="post"
          enctype="text/plain"
        >
          <div class="mb-3">
            <label for="name" class="form-label">Your Name</label>
            <input
              type="text"
              class="form-control"
              id="name"
              name="Name"
              placeholder="Enter your name"
              required
            />
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Your Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="Email"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="mb-4">
            <label for="message" class="form-label">Your Message</label>
            <textarea
              class="form-control"
              id="message"
              name="Message"
              rows="6"
              placeholder="Write your message here..."
              required
            ></textarea>
          </div>

          <div class="d-flex gap-3 flex-wrap justify-content-center">
            <button type="submit" class="btn main-btn px-4">
              <i class="fa-solid fa-paper-plane me-2"></i>Send Message
            </button>
            <button type="reset" class="btn outline-btn px-4">
              <i class="fa-solid fa-rotate-left me-2"></i>Reset
            </button>
          </div>
        </form>
      </div>
    </section>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
